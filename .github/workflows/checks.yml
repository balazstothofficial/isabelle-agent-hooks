name: checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check --select F .
      - name: Test
        run: |
          python isabelle_hook_common.test.py
          python no_guessed_proofs.test.py
          python no_apply_scripts.test.py
