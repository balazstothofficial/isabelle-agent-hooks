name: checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: oven-sh/setup-bun@v2
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check --select F .
      - name: Test
        run: |
          python test/isabelle_hook_common.test.py
          python test/no_guessed_proofs.test.py
          python test/no_apply_scripts.test.py
      - name: Test OpenCode plugin
        run: bun test test/opencode-guard.test.ts
